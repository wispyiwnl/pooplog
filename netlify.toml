[build]
  command = "printf 'window.POOPLOG_CONFIG={SUPABASE_URL:\"%s\",SUPABASE_KEY:\"%s\"};' \"$SUPABASE_URL\" \"$SUPABASE_KEY\" > config.js"
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_KEY,SUPABASE_URL"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"